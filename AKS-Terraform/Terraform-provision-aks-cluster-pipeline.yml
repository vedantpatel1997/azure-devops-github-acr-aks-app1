trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

# Define Variables for Environments
variables:
- name: DEV_ENVIRONMENT
  value: dev
- name: QA_ENVIRONMENT
  value: qa


# Stage-1: Terraform Validate Stage
## Step-1: Publish Artifacts to Pipeline (Pipeline artifacts provide a way to share files between stages in a pipeline or between different pipelines. )
## Step-2: Install Latest Terraform (0.13.5) (Ideally not needed if we use default Ubuntu Agents)
## Step-3: Validate Terraform Manifests (terraform init, terraform validate)

stages:
  - stage: TerraformValidate
    jobs:
      - job: TerraformValidateJob
        continueOnError: false
        steps:
          - task: PublishPipelineArtifact@1
            displayName: Publish Artifacts
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/AKS-Terraform/Terraform-manifests'
              artifact: 'Terraform-manifests-out'
              publishLocation: 'pipeline'

          - task: TerraformInstaller@1
            displayName: Terraform Install
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTask@5
            displayName: Terraform Initialization
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/AKS-Terraform/Terraform-manifests'
              backendServiceArm: 'terraform-aks-azurerm-svc-con'
              backendAzureRmResourceGroupName: 'TerraformStorageAccount'
              backendAzureRmStorageAccountName: 'strgterraformvp'
              backendAzureRmContainerName: 'tfstatefiles'
              backendAzureRmKey: 'aks-$(DEV_ENVIRONMENT).tfstate'

          - task: TerraformTask@5
            displayName: Terraform Validate
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: '$(System.DefaultWorkingDirectory)/AKS-Terraform/Terraform-manifests'


# Stage-2: Deploy DEV AKS Cluster
## Step-1: Download SSH Secure File
## Step-2: Terraform Initialize with DEV remote state
## Step-3: Terraform Plan
## Step-4: Terraform Apply

  - stage: DeployDevAKSCluster
    displayName: Deploy DEV AKS Cluster
    dependsOn: TerraformValidate
    jobs:
      - deployment: DeploytoDevAKSCluster
        displayName: Deploy to DEV AKS Cluster
        pool:
          vmImage: 'ubuntu-latest'
        environment: $(DEV_ENVIRONMENT)
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadSecureFile@1
                  displayName: Download SSH Key
                  name: sshkey
                  inputs:
                    secureFile: 'aks-terraform-devops-ssh-key-ubuntu.pub'

                - task: TerraformInstaller@1
                  displayName: Terraform Install
                  inputs:
                    terraformVersion: 'latest'

                - task: TerraformTask@5
                  displayName: Terraform Init
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: '$(Pipeline.Workspace)/Terraform-manifests-out'
                    backendServiceArm: 'terraform-aks-azurerm-svc-con'
                    backendAzureRmResourceGroupName: 'TerraformStorageAccount'
                    backendAzureRmStorageAccountName: 'strgterraformvp'
                    backendAzureRmContainerName: 'tfstatefiles'
                    backendAzureRmKey: 'aks-$(DEV_ENVIRONMENT).tfstate'

                - task: TerraformTask@5
                  displayName: Terraform Plan
                  inputs:
                    provider: 'azurerm'
                    command: 'plan'
                    workingDirectory: '$(Pipeline.Workspace)/Terraform-manifests-out'
                    commandOptions: '-var ssh_public_key=$(sshkey.secureFilePath) -var environment=$(DEV_ENVIRONMENT) -out $(Pipeline.Workspace)/Terraform-manifests-out/$(DEV_ENVIRONMENT)-$(Build.BuildId).out'
                    environmentServiceNameAzureRM: 'terraform-aks-azurerm-svc-con'

                - task: TerraformTask@5
                  displayName: Terraform Apply
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: '$(Pipeline.Workspace)/Terraform-manifests-out'
                    commandOptions: '$(Pipeline.Workspace)/Terraform-manifests-out/$(DEV_ENVIRONMENT)-$(Build.BuildId).out'
                    environmentServiceNameAzureRM: 'terraform-aks-azurerm-svc-con'

# Stage-3: Deploy QA AKS Cluster
## This stage depends only on validation, so DEV and QA can run in parallel.

  - stage: DeployQaAKSCluster
    displayName: Deploy QA AKS Cluster
    dependsOn: TerraformValidate
    jobs:
      - deployment: DeploytoQaAKSCluster
        displayName: Deploy to QA AKS Cluster
        pool:
          vmImage: 'ubuntu-latest'
        environment: $(QA_ENVIRONMENT)
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadSecureFile@1
                  displayName: Download SSH Key
                  name: sshkey
                  inputs:
                    secureFile: 'aks-terraform-devops-ssh-key-ubuntu.pub'

                - task: TerraformInstaller@1
                  displayName: Terraform Install
                  inputs:
                    terraformVersion: 'latest'

                - task: TerraformTask@5
                  displayName: Terraform Init
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: '$(Pipeline.Workspace)/Terraform-manifests-out'
                    backendServiceArm: 'terraform-aks-azurerm-svc-con'
                    backendAzureRmResourceGroupName: 'TerraformStorageAccount'
                    backendAzureRmStorageAccountName: 'strgterraformvp'
                    backendAzureRmContainerName: 'tfstatefiles'
                    backendAzureRmKey: 'aks-$(QA_ENVIRONMENT).tfstate'

                - task: TerraformTask@5
                  displayName: Terraform Plan
                  inputs:
                    provider: 'azurerm'
                    command: 'plan'
                    workingDirectory: '$(Pipeline.Workspace)/Terraform-manifests-out'
                    commandOptions: '-var ssh_public_key=$(sshkey.secureFilePath) -var environment=$(QA_ENVIRONMENT) -out $(Pipeline.Workspace)/Terraform-manifests-out/$(QA_ENVIRONMENT)-$(Build.BuildId).out'
                    environmentServiceNameAzureRM: 'terraform-aks-azurerm-svc-con'

                - task: TerraformTask@5
                  displayName: Terraform Apply
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: '$(Pipeline.Workspace)/Terraform-manifests-out'
                    commandOptions: '$(Pipeline.Workspace)/Terraform-manifests-out/$(QA_ENVIRONMENT)-$(Build.BuildId).out'
                    environmentServiceNameAzureRM: 'terraform-aks-azurerm-svc-con'
