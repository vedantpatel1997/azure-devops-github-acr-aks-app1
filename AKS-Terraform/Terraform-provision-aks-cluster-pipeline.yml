trigger:
  branches:
    include:
    - main
  paths:
    include:
    - AKS-Terraform/Terraform-manifests/**

pool:
  vmImage: 'ubuntu-latest'

parameters:
- name: targetEnvironments
  displayName: Target environments to provision
  type: stringList
  default:
  - dev
  - qa
  - prod
  values:
  - dev
  - qa
  - prod

variables:
- name: TERRAFORM_MANIFESTS_SOURCE_DIR
  value: '$(System.DefaultWorkingDirectory)/AKS-Terraform/Terraform-manifests'
- name: TERRAFORM_MANIFESTS_WORK_DIR
  value: '$(Pipeline.Workspace)/Terraform-manifests-out'
- name: TERRAFORM_SERVICE_CONNECTION
  value: 'terraform-aks-azurerm-svc-con'
- name: TERRAFORM_STATE_RESOURCE_GROUP
  value: 'TerraformStorageAccount'
- name: TERRAFORM_STATE_STORAGE_ACCOUNT
  value: 'strgterraformvp'
- name: TERRAFORM_STATE_CONTAINER
  value: 'tfstatefiles'
- name: SSH_PUBLIC_KEY_FILE
  value: '$(Pipeline.Workspace)/secure-files/aks-terraform-devops-ssh-key-ubuntu.pub'

stages:
- stage: TerraformValidate
  displayName: Validate Terraform
  jobs:
  - job: TerraformValidateJob
    displayName: Validate Terraform Manifests
    continueOnError: false
    steps:
    - task: PublishPipelineArtifact@1
      displayName: Publish Terraform Manifests
      inputs:
        targetPath: '$(TERRAFORM_MANIFESTS_SOURCE_DIR)'
        artifact: 'Terraform-manifests-out'
        publishLocation: 'pipeline'

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(TERRAFORM_MANIFESTS_SOURCE_DIR)'
        backendServiceArm: '$(TERRAFORM_SERVICE_CONNECTION)'
        backendAzureRmResourceGroupName: '$(TERRAFORM_STATE_RESOURCE_GROUP)'
        backendAzureRmStorageAccountName: '$(TERRAFORM_STATE_STORAGE_ACCOUNT)'
        backendAzureRmContainerName: '$(TERRAFORM_STATE_CONTAINER)'
        backendAzureRmKey: 'aks-dev.tfstate'

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(TERRAFORM_MANIFESTS_SOURCE_DIR)'

- ${{ each environmentName in parameters.targetEnvironments }}:
  - stage: TerraformPlan_${{ environmentName }}
    displayName: Create Terraform Plan (${{ environmentName }})
    dependsOn: TerraformValidate
    jobs:
    - job: TerraformPlanJob_${{ environmentName }}
      displayName: Generate Terraform Plan (${{ environmentName }})
      steps:
      - task: DownloadPipelineArtifact@2
        displayName: Download Terraform Manifests
        inputs:
          buildType: 'current'
          artifactName: 'Terraform-manifests-out'
          targetPath: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

      - task: DownloadSecureFile@1
        displayName: Download SSH Public Key
        name: sshkey
        inputs:
          secureFile: 'aks-terraform-devops-ssh-key-ubuntu.pub'

      - script: |
          mkdir -p "$(Pipeline.Workspace)/secure-files"
          cp "$(sshkey.secureFilePath)" "$(SSH_PUBLIC_KEY_FILE)"
        displayName: Stage SSH Public Key

      - task: TerraformInstaller@1
        displayName: Install Terraform
        inputs:
          terraformVersion: 'latest'

      - task: TerraformTask@5
        displayName: Terraform Init
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
          backendServiceArm: '$(TERRAFORM_SERVICE_CONNECTION)'
          backendAzureRmResourceGroupName: '$(TERRAFORM_STATE_RESOURCE_GROUP)'
          backendAzureRmStorageAccountName: '$(TERRAFORM_STATE_STORAGE_ACCOUNT)'
          backendAzureRmContainerName: '$(TERRAFORM_STATE_CONTAINER)'
          backendAzureRmKey: 'aks-${{ environmentName }}.tfstate'

      - task: TerraformTask@5
        displayName: Terraform Plan
        inputs:
          provider: 'azurerm'
          command: 'plan'
          workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
          commandOptions: '-var ssh_public_key=$(SSH_PUBLIC_KEY_FILE) -var environment=${{ environmentName }} -out $(TERRAFORM_MANIFESTS_WORK_DIR)/${{ environmentName }}-$(Build.BuildId).tfplan'
          environmentServiceNameAzureRM: '$(TERRAFORM_SERVICE_CONNECTION)'

      - script: |
          mkdir -p "$(Pipeline.Workspace)/plan-bundle-${{ environmentName }}"
          terraform show -no-color "$(TERRAFORM_MANIFESTS_WORK_DIR)/${{ environmentName }}-$(Build.BuildId).tfplan" > "$(Pipeline.Workspace)/plan-bundle-${{ environmentName }}/${{ environmentName }}-$(Build.BuildId).txt"
          cp "$(TERRAFORM_MANIFESTS_WORK_DIR)/${{ environmentName }}-$(Build.BuildId).tfplan" "$(Pipeline.Workspace)/plan-bundle-${{ environmentName }}/${{ environmentName }}-$(Build.BuildId).tfplan"
        displayName: Prepare Terraform Plan Bundle
        workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

      - task: PublishPipelineArtifact@1
        displayName: Publish Terraform Plan Bundle
        inputs:
          targetPath: '$(Pipeline.Workspace)/plan-bundle-${{ environmentName }}'
          artifact: '${{ environmentName }}-plan'
          publishLocation: 'pipeline'

  - stage: TerraformApply_${{ environmentName }}
    displayName: Apply Terraform Plan (${{ environmentName }})
    dependsOn: TerraformPlan_${{ environmentName }}
    jobs:
    - deployment: ApplyAKSCluster_${{ environmentName }}
      displayName: Apply AKS Cluster (${{ environmentName }})
      environment: '${{ environmentName }}'
      strategy:
        runOnce:
          deploy:
            steps:
            - task: DownloadPipelineArtifact@2
              displayName: Download Terraform Manifests
              inputs:
                buildType: 'current'
                artifactName: 'Terraform-manifests-out'
                targetPath: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

            - task: DownloadPipelineArtifact@2
              displayName: Download Reviewed Terraform Plan
              inputs:
                buildType: 'current'
                artifactName: '${{ environmentName }}-plan'
                targetPath: '$(Pipeline.Workspace)/plan-bundle-${{ environmentName }}'

            - task: DownloadSecureFile@1
              displayName: Download SSH Public Key
              name: sshkey
              inputs:
                secureFile: 'aks-terraform-devops-ssh-key-ubuntu.pub'

            - script: |
                mkdir -p "$(Pipeline.Workspace)/secure-files"
                cp "$(sshkey.secureFilePath)" "$(SSH_PUBLIC_KEY_FILE)"
              displayName: Stage SSH Public Key

            - task: TerraformInstaller@1
              displayName: Install Terraform
              inputs:
                terraformVersion: 'latest'

            - task: TerraformTask@5
              displayName: Terraform Init
              inputs:
                provider: 'azurerm'
                command: 'init'
                workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
                backendServiceArm: '$(TERRAFORM_SERVICE_CONNECTION)'
                backendAzureRmResourceGroupName: '$(TERRAFORM_STATE_RESOURCE_GROUP)'
                backendAzureRmStorageAccountName: '$(TERRAFORM_STATE_STORAGE_ACCOUNT)'
                backendAzureRmContainerName: '$(TERRAFORM_STATE_CONTAINER)'
                backendAzureRmKey: 'aks-${{ environmentName }}.tfstate'

            - task: TerraformTask@5
              displayName: Terraform Apply
              inputs:
                provider: 'azurerm'
                command: 'apply'
                workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
                commandOptions: '$(Pipeline.Workspace)/plan-bundle-${{ environmentName }}/${{ environmentName }}-$(Build.BuildId).tfplan'
                environmentServiceNameAzureRM: '$(TERRAFORM_SERVICE_CONNECTION)'
