trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
- name: QA_ENVIRONMENT
  value: qa
- name: PROD_ENVIRONMENT
  value: prod
- name: TERRAFORM_MANIFESTS_SOURCE_DIR
  value: '$(System.DefaultWorkingDirectory)/AKS-Terraform/Terraform-manifests'
- name: TERRAFORM_MANIFESTS_WORK_DIR
  value: '$(Pipeline.Workspace)/Terraform-manifests-out'
- name: TERRAFORM_SERVICE_CONNECTION
  value: 'terraform-aks-azurerm-svc-con'
- name: TERRAFORM_STATE_RESOURCE_GROUP
  value: 'TerraformStorageAccount'
- name: TERRAFORM_STATE_STORAGE_ACCOUNT
  value: 'strgterraformvp'
- name: TERRAFORM_STATE_CONTAINER
  value: 'tfstatefiles'
- name: SSH_PUBLIC_KEY_FILE
  value: '$(Pipeline.Workspace)/secure-files/aks-terraform-devops-ssh-key-ubuntu.pub'

stages:
- stage: TerraformValidate
  displayName: Validate Terraform
  jobs:
  - job: TerraformValidateJob
    displayName: Validate Terraform Manifests
    continueOnError: false
    steps:
    - task: PublishPipelineArtifact@1
      displayName: Publish Terraform Manifests
      inputs:
        targetPath: '$(TERRAFORM_MANIFESTS_SOURCE_DIR)'
        artifact: 'Terraform-manifests-out'
        publishLocation: 'pipeline'

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(TERRAFORM_MANIFESTS_SOURCE_DIR)'
        backendServiceArm: '$(TERRAFORM_SERVICE_CONNECTION)'
        backendAzureRmResourceGroupName: '$(TERRAFORM_STATE_RESOURCE_GROUP)'
        backendAzureRmStorageAccountName: '$(TERRAFORM_STATE_STORAGE_ACCOUNT)'
        backendAzureRmContainerName: '$(TERRAFORM_STATE_CONTAINER)'
        backendAzureRmKey: 'aks-$(QA_ENVIRONMENT).tfstate'

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(TERRAFORM_MANIFESTS_SOURCE_DIR)'

- stage: TerraformQaPlan
  displayName: Create QA Plan
  dependsOn: TerraformValidate
  jobs:
  - job: TerraformQaPlanJob
    displayName: Generate QA Terraform Plan
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: Download Terraform Manifests
      inputs:
        buildType: 'current'
        artifactName: 'Terraform-manifests-out'
        targetPath: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

    - task: DownloadSecureFile@1
      displayName: Download SSH Public Key
      name: sshkey
      inputs:
        secureFile: 'aks-terraform-devops-ssh-key-ubuntu.pub'

    - script: |
        mkdir -p "$(Pipeline.Workspace)/secure-files"
        cp "$(sshkey.secureFilePath)" "$(SSH_PUBLIC_KEY_FILE)"
      displayName: Stage SSH Public Key

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
        backendServiceArm: '$(TERRAFORM_SERVICE_CONNECTION)'
        backendAzureRmResourceGroupName: '$(TERRAFORM_STATE_RESOURCE_GROUP)'
        backendAzureRmStorageAccountName: '$(TERRAFORM_STATE_STORAGE_ACCOUNT)'
        backendAzureRmContainerName: '$(TERRAFORM_STATE_CONTAINER)'
        backendAzureRmKey: 'aks-$(QA_ENVIRONMENT).tfstate'

    - task: TerraformTask@5
      displayName: Terraform Plan QA
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
        commandOptions: '-var ssh_public_key=$(SSH_PUBLIC_KEY_FILE) -var environment=$(QA_ENVIRONMENT) -out $(TERRAFORM_MANIFESTS_WORK_DIR)/$(QA_ENVIRONMENT)-$(Build.BuildId).tfplan'
        environmentServiceNameAzureRM: '$(TERRAFORM_SERVICE_CONNECTION)'

    - script: |
        mkdir -p "$(Pipeline.Workspace)/qa-plan-bundle"
        terraform show -no-color "$(TERRAFORM_MANIFESTS_WORK_DIR)/$(QA_ENVIRONMENT)-$(Build.BuildId).tfplan" > "$(Pipeline.Workspace)/qa-plan-bundle/$(QA_ENVIRONMENT)-$(Build.BuildId).txt"
        cp "$(TERRAFORM_MANIFESTS_WORK_DIR)/$(QA_ENVIRONMENT)-$(Build.BuildId).tfplan" "$(Pipeline.Workspace)/qa-plan-bundle/$(QA_ENVIRONMENT)-$(Build.BuildId).tfplan"
      displayName: Prepare QA Plan Bundle
      workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

    - task: PublishPipelineArtifact@1
      displayName: Publish QA Plan Bundle
      inputs:
        targetPath: '$(Pipeline.Workspace)/qa-plan-bundle'
        artifact: 'qa-plan'
        publishLocation: 'pipeline'

- stage: DeployQaAKSCluster
  displayName: Apply QA Plan
  dependsOn: TerraformQaPlan
  jobs:
  - deployment: ApplyQaAKSCluster
    displayName: Apply QA AKS Cluster
    environment: $(QA_ENVIRONMENT)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: Download Terraform Manifests
            inputs:
              buildType: 'current'
              artifactName: 'Terraform-manifests-out'
              targetPath: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

          - task: DownloadPipelineArtifact@2
            displayName: Download Reviewed QA Plan
            inputs:
              buildType: 'current'
              artifactName: 'qa-plan'
              targetPath: '$(Pipeline.Workspace)/qa-plan-bundle'

          - task: DownloadSecureFile@1
            displayName: Download SSH Public Key
            name: sshkey
            inputs:
              secureFile: 'aks-terraform-devops-ssh-key-ubuntu.pub'

          - script: |
              mkdir -p "$(Pipeline.Workspace)/secure-files"
              cp "$(sshkey.secureFilePath)" "$(SSH_PUBLIC_KEY_FILE)"
            displayName: Stage SSH Public Key

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTask@5
            displayName: Terraform Init
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
              backendServiceArm: '$(TERRAFORM_SERVICE_CONNECTION)'
              backendAzureRmResourceGroupName: '$(TERRAFORM_STATE_RESOURCE_GROUP)'
              backendAzureRmStorageAccountName: '$(TERRAFORM_STATE_STORAGE_ACCOUNT)'
              backendAzureRmContainerName: '$(TERRAFORM_STATE_CONTAINER)'
              backendAzureRmKey: 'aks-$(QA_ENVIRONMENT).tfstate'

          - task: TerraformTask@5
            displayName: Terraform Apply QA Plan
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
              commandOptions: '$(Pipeline.Workspace)/qa-plan-bundle/$(QA_ENVIRONMENT)-$(Build.BuildId).tfplan'
              environmentServiceNameAzureRM: '$(TERRAFORM_SERVICE_CONNECTION)'

- stage: TerraformProdPlan
  displayName: Create Prod Plan
  dependsOn: DeployQaAKSCluster
  jobs:
  - job: TerraformProdPlanJob
    displayName: Generate Prod Terraform Plan
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: Download Terraform Manifests
      inputs:
        buildType: 'current'
        artifactName: 'Terraform-manifests-out'
        targetPath: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

    - task: DownloadSecureFile@1
      displayName: Download SSH Public Key
      name: sshkey
      inputs:
        secureFile: 'aks-terraform-devops-ssh-key-ubuntu.pub'

    - script: |
        mkdir -p "$(Pipeline.Workspace)/secure-files"
        cp "$(sshkey.secureFilePath)" "$(SSH_PUBLIC_KEY_FILE)"
      displayName: Stage SSH Public Key

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
        backendServiceArm: '$(TERRAFORM_SERVICE_CONNECTION)'
        backendAzureRmResourceGroupName: '$(TERRAFORM_STATE_RESOURCE_GROUP)'
        backendAzureRmStorageAccountName: '$(TERRAFORM_STATE_STORAGE_ACCOUNT)'
        backendAzureRmContainerName: '$(TERRAFORM_STATE_CONTAINER)'
        backendAzureRmKey: 'aks-$(PROD_ENVIRONMENT).tfstate'

    - task: TerraformTask@5
      displayName: Terraform Plan Prod
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
        commandOptions: '-var ssh_public_key=$(SSH_PUBLIC_KEY_FILE) -var environment=$(PROD_ENVIRONMENT) -out $(TERRAFORM_MANIFESTS_WORK_DIR)/$(PROD_ENVIRONMENT)-$(Build.BuildId).tfplan'
        environmentServiceNameAzureRM: '$(TERRAFORM_SERVICE_CONNECTION)'

    - script: |
        mkdir -p "$(Pipeline.Workspace)/prod-plan-bundle"
        terraform show -no-color "$(TERRAFORM_MANIFESTS_WORK_DIR)/$(PROD_ENVIRONMENT)-$(Build.BuildId).tfplan" > "$(Pipeline.Workspace)/prod-plan-bundle/$(PROD_ENVIRONMENT)-$(Build.BuildId).txt"
        cp "$(TERRAFORM_MANIFESTS_WORK_DIR)/$(PROD_ENVIRONMENT)-$(Build.BuildId).tfplan" "$(Pipeline.Workspace)/prod-plan-bundle/$(PROD_ENVIRONMENT)-$(Build.BuildId).tfplan"
      displayName: Prepare Prod Plan Bundle
      workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

    - task: PublishPipelineArtifact@1
      displayName: Publish Prod Plan Bundle
      inputs:
        targetPath: '$(Pipeline.Workspace)/prod-plan-bundle'
        artifact: 'prod-plan'
        publishLocation: 'pipeline'

- stage: DeployProdAKSCluster
  displayName: Apply Prod Plan
  dependsOn: TerraformProdPlan
  jobs:
  - deployment: ApplyProdAKSCluster
    displayName: Apply Prod AKS Cluster
    environment: $(PROD_ENVIRONMENT)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: Download Terraform Manifests
            inputs:
              buildType: 'current'
              artifactName: 'Terraform-manifests-out'
              targetPath: '$(TERRAFORM_MANIFESTS_WORK_DIR)'

          - task: DownloadPipelineArtifact@2
            displayName: Download Reviewed Prod Plan
            inputs:
              buildType: 'current'
              artifactName: 'prod-plan'
              targetPath: '$(Pipeline.Workspace)/prod-plan-bundle'

          - task: DownloadSecureFile@1
            displayName: Download SSH Public Key
            name: sshkey
            inputs:
              secureFile: 'aks-terraform-devops-ssh-key-ubuntu.pub'

          - script: |
              mkdir -p "$(Pipeline.Workspace)/secure-files"
              cp "$(sshkey.secureFilePath)" "$(SSH_PUBLIC_KEY_FILE)"
            displayName: Stage SSH Public Key

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTask@5
            displayName: Terraform Init
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
              backendServiceArm: '$(TERRAFORM_SERVICE_CONNECTION)'
              backendAzureRmResourceGroupName: '$(TERRAFORM_STATE_RESOURCE_GROUP)'
              backendAzureRmStorageAccountName: '$(TERRAFORM_STATE_STORAGE_ACCOUNT)'
              backendAzureRmContainerName: '$(TERRAFORM_STATE_CONTAINER)'
              backendAzureRmKey: 'aks-$(PROD_ENVIRONMENT).tfstate'

          - task: TerraformTask@5
            displayName: Terraform Apply Prod Plan
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(TERRAFORM_MANIFESTS_WORK_DIR)'
              commandOptions: '$(Pipeline.Workspace)/prod-plan-bundle/$(PROD_ENVIRONMENT)-$(Build.BuildId).tfplan'
              environmentServiceNameAzureRM: '$(TERRAFORM_SERVICE_CONNECTION)'
