apiVersion: apps/v1
kind: Deployment
metadata:
  name: windows-app1
  labels:
    app.kubernetes.io/name: windows-app1
    app.kubernetes.io/component: application
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: aks-terraform-samples
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: windows-app1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: windows-app1
        app.kubernetes.io/component: application
        app.kubernetes.io/managed-by: kubectl
        app.kubernetes.io/part-of: aks-terraform-samples
    spec:
      nodeSelector:
        kubernetes.io/os: windows
        workload: dotnet-apps
      containers:
        - name: windows-app1
          image: mcr.microsoft.com/dotnet/framework/samples:aspnetapp
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 1
              memory: 800Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
