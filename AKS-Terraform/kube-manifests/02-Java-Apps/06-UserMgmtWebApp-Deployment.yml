apiVersion: apps/v1
kind: Deployment
metadata:
  name: usermgmt-webapp
  labels:
    app.kubernetes.io/name: usermgmt-webapp
    app.kubernetes.io/component: application
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: aks-terraform-samples
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: usermgmt-webapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: usermgmt-webapp
        app.kubernetes.io/component: application
        app.kubernetes.io/managed-by: kubectl
        app.kubernetes.io/part-of: aks-terraform-samples
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        workload: java-apps
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Checking MySQL availability..."
              until nc -z mysql 3306; do
                sleep 2
              done
              echo "MySQL is ready."
      containers:
        - name: usermgmt-webapp
          image: stacksimplify/kube-usermgmt-webapp:1.0.0-MySQLDB
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOSTNAME
              value: mysql
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: webappdb
            - name: DB_USERNAME
              value: root
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-auth
                  key: mysql-root-password
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
