apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  labels:
    app.kubernetes.io/name: nginx-web
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: aks-terraform-samples
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-web
        app.kubernetes.io/component: web
        app.kubernetes.io/managed-by: kubectl
        app.kubernetes.io/part-of: aks-terraform-samples
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        workload: system-apps
      containers:
        - name: nginx-web
          image: stacksimplify/kube-nginxapp1:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
